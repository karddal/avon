name: Backend Lints, Build and Run Tests
on:
  pull_request:
    paths:
      - 'backend/**'
jobs:
  ruff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "./backend"

