name: Frontend Lints, Run Tests
on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  lint-and-format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Run lints
        run: bunx biome ci
