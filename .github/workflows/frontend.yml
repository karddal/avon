name: Frontend Lints, Run Tests
on:
  pull_request:
    paths:
      - "frontend/**"

jobs:
  lint-and-format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install npm
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Install dependencies
        run: npm ci

      - name: Run lints
        run: npx biome ci

      - name: Build Frontend
        run: npm run build
      # - name: Run tests
      #   run: bun test
      # - name: Publish Test Report
      #   uses: mikepenz/action-junit-report@v5
      #   if: success() || failure() # always run even if the previous step fails
      #   with:
      #     report_paths: '**/ci/*.xml'

  run-frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "./backend/.python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install the project
        run: cd ./backend && uv sync --locked --all-extras --dev
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Clear & Seed Database
        run: npm run db:clear && npm run db:seed
      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          NODE_ENV: test
        with:
          working-directory: ./frontend
          env: NODE_ENV=test
          command: npm run test
